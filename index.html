<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>StudyPilot</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">

</head>

<body>
    <div class="container">

    <div class="hero">

        <div class="brand">

    <img src="assets/logo/logo.png"
         alt="StudyPilot Logo"
         class="logo">

    <h1>
        <span class="study">Study</span><span class="pilot">Pilot</span>
    </h1>

</div>

        <p class="tagline">
            Plan smarter. Study better.
        </p>

        <p class="description">
            Every study session is a quiet investment in the person you're becoming.
        </p>

    </div>

    <div class="login-card">

    <h3>Welcome back</h3>

    <p class="login-text">
        Sign in to continue your learning journey.
    </p>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <p id="error-message" class="error-message"></p>
    <button>
        Sign In
    </button>

    <p class="create-account">
        Don't have an account?

        <a href="#">
            Create Account
        </a>
    </p>

</div>

</div>

<script src="assets/js/script.js"></script>

</body>

</html>
