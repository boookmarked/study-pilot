<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account | StudyPilot</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>

<body>

<div class="container">

<div class="hero">

<div class="brand">

<img
src="assets/logo/logo.png"
class="logo"
alt="StudyPilot Logo">

<h1>

<span class="study">Study</span><span class="pilot">Pilot</span>

</h1>

</div>

<p class="tagline">

Begin your journey.

</p>

<p class="description">

Create your StudyPilot account and let your study sessions finally stop behaving like escaped zoo animals.

</p>

</div>

<div class="login-card">

<h3>

Create Account

</h3>

<p class="login-text">

Fill in your details to get started.

</p>

<input
type="text"
id="name"
placeholder="Full Name">

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<input
type="password"
id="confirmPassword"
placeholder="Confirm Password">

<p
id="signup-error"
class="error-message">

</p>

<button id="signupBtn">

Create Account

</button>

<p class="create-account">

Already have an account?

<a href="index.html">

Sign In

</a>

</p>

</div>

</div>

<script src="assets/js/authentication.js"></script>

</body>

</html>
