<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0">
    <link rel="stylesheet" href="../assets/css/app.css">
</head>
<body>

<div class="dashboard">

    <!-- ================= Sidebar ================= -->

    <aside class="sidebar">

        <div class="logo-section">

            <img src="../assets/logo/logo_white.png"
                class="sidebar-logo"
                alt="StudyPilot">

            <h2>StudyPilot</h2>

        </div>

        <nav>

<a href="dashboard.html" class="active">

<span class="material-symbols-rounded">
dashboard
</span>

Dashboard

</a>

<a href="planner.html">

<span class="material-symbols-rounded">
edit_calendar
</span>

Planner

</a>

<a href="subjects.html">

<span class="material-symbols-rounded">
menu_book
</span>

Subjects

</a>

<a href="analytics.html">

<span class="material-symbols-rounded">
monitoring
</span>

Analytics

</a>

<a href="settings.html">

<span class="material-symbols-rounded">
settings
</span>

Settings

</a>

<a href="../index.html">

<span class="material-symbols-rounded">
logout
</span>

Logout

</a>

</nav>

    </aside>


    <!-- ================= Main ================= -->

    <main class="content">


        <!-- Hero -->

        <section class="hero">

            <div>

                <h1 id="greeting">
                    Good Evening
                </h1>

                <p id="date">
                    Tuesday, July 8
                </p>

            </div>

        </section>


        <!-- Quote -->

        <section class="quote-section">

            <div class="quote-mark">❝</div>

            <p id="quote">

                Discipline is choosing
                between what you want now
                and what you want most.

            </p>

        </section>


        <!-- Dashboard Grid -->

        <section class="dashboard-grid">


            <!-- Today's Focus -->

            <div class="focus-card">

                <div class="card-title">

                    Today's Focus

                </div>

                <div id="task-list">

                    <!-- JS inserts tasks -->

                </div>

            </div>



            <!-- Progress -->

            <div class="progress-card">

                <div class="card-title">

                    Progress

                </div>

                <div class="progress-bar">

                    <div
                    class="progress-fill"
                    id="progressFill">

                    </div>

                </div>

                <p id="progressText">

                    0% Completed

                </p>

            </div>



            <!-- Deadlines -->

            <div class="deadline-card">

                <div class="card-title">

                    Upcoming

                </div>

                <div id="deadline-list">

                </div>

            </div>

        </section>

    </main>

</div>

<script src="../assets/js/app.js"></script>

</body>

</html>
